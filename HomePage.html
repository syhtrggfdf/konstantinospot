<script>
let lastScrollTop = 0;
window.addEventListener("scroll", () => {
    let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
    const navbar = document.getElementById("mainNav");
    scrollTop > lastScrollTop ? navbar.classList.add("nav-up") : navbar.classList.remove("nav-up");
    lastScrollTop = scrollTop;
});

function setup() {
    const holder = document.getElementById('sketch-holder');
    let canvas = createCanvas(holder.offsetWidth, holder.offsetHeight);
    canvas.parent("sketch-holder");
}

function draw() {
    clear(); 
    let speed = frameCount * 0.005; 
    for (let i = 0; i < 60; i++) {
        let x = noise(i * 0.1, speed) * width;
        let y = noise(i * 0.2, speed) * height;
        let d = dist(mouseX, mouseY, x, y);
        let alpha = map(d, 0, 300, 255, 30, true);
        noStroke();
        fill(255, alpha);
        circle(x, y, map(alpha, 30, 255, 1, 3.5));
        if (d < 180) {
            stroke(255, alpha * 0.15);
            line(mouseX, mouseY, x, y);
        }
    }
}

function windowResized() {
    const holder = document.getElementById('sketch-holder');
    resizeCanvas(holder.offsetWidth, holder.offsetHeight);
}
</script>
